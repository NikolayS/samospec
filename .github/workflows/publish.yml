# Copyright 2026 Nikolay Samokhvalov.

name: publish

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish (e.g. v0.4.2). Must already exist."
        required: true

permissions:
  contents: read

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    name: Verify version matches tag
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      version: ${{ steps.check.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}

      - name: Check package.json version == tag
        id: check
        env:
          TAG_RAW: ${{ github.event.release.tag_name || inputs.tag }}
        run: |
          set -Eeuo pipefail
          TAG="${TAG_RAW}"
          PKG=$(node -p "require('./package.json').version")
          EXPECTED="${TAG#v}"
          if [[ "${PKG}" != "${EXPECTED}" ]]; then
            echo "::error::package.json version (${PKG}) != release tag (${EXPECTED})"
            exit 1
          fi
          echo "version=${PKG}" >> "${GITHUB_OUTPUT}"
          echo "Verified: tag=${TAG} → package.json=${PKG}"

  test:
    name: Test / lint / typecheck
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Format check
        run: bun run format:check

      - name: Type check
        run: bun run typecheck

      - name: Test
        run: bun test

  publish:
    name: Publish to npm
    needs: [verify, test]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: npm
      url: https://www.npmjs.com/package/samospec/v/${{ needs.verify.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Node (for npm CLI)
        uses: actions/setup-node@v4
        with:
          # node 24 ships npm 11.x; node 20 ships npm 10.8.2 which
          # may be the root of the mysterious 404 on PUT seen in
          # previous publish attempts (issue #113). npm was
          # verified working from local with 11.8.0 on the same
          # token + .npmrc contents.
          node-version: "24"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Write project .npmrc with auth token
        # Avoids the setup-node `NODE_AUTH_TOKEN` substitution path
        # (which has intermittently produced 404 on PUT in this repo
        # despite the same token publishing fine locally). Write the
        # token directly so npm CLI reads it straight from .npmrc.
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -Eeuo pipefail
          IFS=$'\n\t'
          {
            echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}"
            echo "registry=https://registry.npmjs.org/"
            echo "always-auth=true"
          } > .npmrc
          chmod 600 .npmrc

      - name: npm environment (diagnostic)
        # Token-sensitive output is filtered: `npm config ls -l` prints
        # `_authToken` values, so grep them out. The whoami probe uses
        # the token as a bearer but discards the response body — only
        # the HTTP status code is logged, so the token owner is not
        # disclosed beyond what CI already has access to.
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -Eeuo pipefail
          IFS=$'\n\t'
          echo "node: $(node --version)"
          echo "npm: $(npm --version)"
          npm config get registry
          npm config ls -l 2>&1 \
            | grep -v -iE '(authtoken|password|_auth\b)' || true
          printf 'whoami http status: '
          curl -sS -o /dev/null -w '%{http_code}\n' \
            -H "Authorization: Bearer ${NPM_TOKEN}" \
            https://registry.npmjs.org/-/whoami

      - name: Publish to npm
        # --provenance requires a trusted-publisher config on npmjs;
        # skip it until that's set up. Re-enable via follow-up PR.
        # --loglevel=http surfaces the full HTTP conversation so the
        # 404-on-new-version behavior from CI (issue #121) can be
        # diffed against a local `npm publish --loglevel=http` log.
        # npm redacts the Authorization header in this output.
        run: npm publish --access public --loglevel=http

      - name: Scrub .npmrc
        if: always()
        run: rm -f .npmrc
